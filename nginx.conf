server {
    listen 80;
    server_name scheduler-demo.gt-processing.com
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name scheduler-demo.gt-processing.com;
    
    ssl_certificate /etc/letsencrypt/live/scheduler-demo.gt-processing.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scheduler-demo.gt-processing.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri &uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
